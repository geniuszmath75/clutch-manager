services:
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - .:/app/
    links:
      - php
    networks:
      - pg-network
  
  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    env_file:
      - .env
    ports:
      - "5433:5432"
    networks:
      - pg-network
    volumes:
      - ./docker/db/init:/docker-entrypoint-initdb.d
  
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - pg-network
  
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pg-admin2
    env_file:
      - .env
    ports:
      - "5050:80"
    networks:
      - pg-network

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: node
    working_dir: /app
    volumes:
      - ./package.json:/app/package.json:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      - ./public/assets/ts:/app/public/assets/ts
      - ./public/assets/js:/app/public/assets/js
      - node_modules:/app/node_modules
    restart: unless-stopped
  
networks:
  pg-network:

volumes:
  pg-data:
  node_modules: